---
# ==================== RABBITMQ SERVICE ====================
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: habit-tracker
spec:
  type: NodePort
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      nodePort: 30070
    - name: mgmt
      port: 15672
      targetPort: 15672
      nodePort: 31672

---
