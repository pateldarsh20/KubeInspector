---

apiVersion: v1
kind: LimitRange
metadata:
  name: habit-tracker-limits
  namespace: habit-tracker
spec:
  limits:
  - default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"
    max:
      cpu: "2000m"
      memory: "2Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    type: Container

---

apiVersion: v1
kind: ResourceQuota
metadata:
  name: habit-tracker-quota
  namespace: habit-tracker
spec:
  hard:
    requests.cpu: "16"
    requests.memory: "32Gi"
    limits.cpu: "32"
    limits.memory: "64Gi"
    services: "15"
    persistentvolumeclaims: "10"

---