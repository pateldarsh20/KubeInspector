---
# ==================== ANALYTICS SERVICE ====================
# Heavy service - needs more time
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: habit-tracker
spec:
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: pateldarsh21/habit-tracker:analytics-service-v2
          ports:
            - containerPort: 3004
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3004"
            - name: MONGODB_URI
              value: "mongodb://mongodb-analytics:27017/habit-tracker-analytics"
            - name: JWT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: habit-tracker-config
                  key: JWT_SECRET
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672"
          lifecycle:
            preStop:
              exec:
                command:
                - sh
                - -c
                - "sleep 30"  # Longer sleep for analytics
      terminationGracePeriodSeconds: 90  # More time for heavy service

