---
# ==================== USER SERVICE ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: habit-tracker
spec:
  # NO replicas field - HPA controls this
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: pateldarsh21/habit-tracker:user-service-v2
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: MONGODB_URI
              value: "mongodb://mongodb-users:27017/habit-tracker-users"
            - name: JWT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: habit-tracker-config
                  key: JWT_SECRET
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672"
          # ========== PRE-STOP HOOK ==========
          lifecycle:
            preStop:
              exec:
                command:
                - sh
                - -c
                - "sleep 10"
      # ========== TERMINATION GRACE PERIOD ==========
      terminationGracePeriodSeconds: 45

