---
# ==================== API GATEWAY ====================
# Critical service - needs careful draining
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: habit-tracker
spec:
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: pateldarsh21/habit-tracker:api-gateway-v5
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: JWT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: habit-tracker-config
                  key: JWT_SECRET
            - name: USER_SERVICE_URL
              value: "http://user-service:3001"
            - name: HABIT_SERVICE_URL
              value: "http://habit-service:3002"
            - name: TRACKING_SERVICE_URL
              value: "http://tracking-service:3003"
            - name: ANALYTICS_SERVICE_URL
              value: "http://analytics-service:3004"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:3005"
            - name: RATE_LIMIT_WINDOW_MS
              valueFrom:
                configMapKeyRef:
                  name: habit-tracker-config
                  key: RATE_LIMIT_WINDOW_MS
            - name: RATE_LIMIT_MAX_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: habit-tracker-config
                  key: RATE_LIMIT_MAX_REQUESTS
          lifecycle:
            preStop:
              exec:
                command:
                - sh
                - -c
                - "sleep 15"  # Drain active connections
      terminationGracePeriodSeconds: 60  # Give time to finish requests

---
# ==================== FRONTEND ====================
# Static files - fast shutdown
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: habit-tracker
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: pateldarsh21/habit-tracker:frontend-v3
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          lifecycle:
            preStop:
              exec:
                command:
                - sh
                - -c
                - "sleep 5"  # Short sleep for static files
      terminationGracePeriodSeconds: 30